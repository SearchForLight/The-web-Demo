<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>远程工业运维平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">工业智能运维平台</span>
            <span id="welcome" class="text-white me-3"></span>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">退出登录</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="mb-4">上传图像进行清晰化处理与工业运维</h3>
        
        <!-- 上传区 -->
        <div class="card mb-4">
            <div class="card-body">
                <input type="file" id="imageInput" class="form-control mb-3" accept="image/*">
                <button onclick="uploadImage()" class="btn btn-primary w-100">提交给后端处理（清晰化 + 运维）</button>
            </div>
        </div>

        <!-- 结果展示区 -->
        <div id="resultSection" class="row" style="display:none;">
            <div class="col-md-6">
                <h5>AI增强后高清图</h5>
                <img id="enhancedImg" class="img-fluid border rounded" style="max-height:400px;">
            </div>
            <div class="col-md-6">
                <h5>工业运维诊断结果</h5>
                <div id="diagnosis" class="alert alert-info"></div>
            </div>
        </div>

        <!-- 咨询意见区 -->
        <div class="card mt-4">
            <div class="card-body">
                <h5>咨询远程专家意见</h5>
                <textarea id="consultText" class="form-control" rows="3" placeholder="请输入补充问题或描述..."></textarea>
                <button onclick="consultOpinion()" class="btn btn-success mt-3">发送咨询</button>
                <div id="consultResult" class="mt-3 alert alert-secondary"></div>
            </div>
        </div>
    </div>

    <script>
        // 登录检查
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        if (!token) window.location.href = 'login.html';
        document.getElementById('welcome').textContent = `欢迎，${username}`;

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // 上传图像调用后端API
        async function uploadImage() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert('请先选择图像文件');

            const formData = new FormData();
            formData.append('image', file);   // 后端接收字段名

            document.getElementById('resultSection').style.display = 'flex';

            try {
                const res = await fetch('http://127.0.0.1:8000/api/process', {  // ← 改成你们后端实际地址
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();

                document.getElementById('enhancedImg').src = `data:image/jpeg;base64,${data.enhanced_base64 || data.enhanced}`;
                document.getElementById('diagnosis').innerHTML = `<strong>诊断：</strong> ${data.diagnosis || data.result}`;
            } catch (err) {
                alert('API调用失败（先用mock跑通，后端ready后改URL）');
            }
        }

        // 咨询意见调用后端API
        async function consultOpinion() {
            const text = document.getElementById('consultText').value.trim();
            if (!text) return alert('请输入咨询内容');

            try {
                const res = await fetch('http://127.0.0.1:8000/api/consult', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ question: text })
                });
                const data = await res.json();
                document.getElementById('consultResult').innerText = data.opinion || data.message || '专家已回复';
            } catch (err) {
                alert('咨询API调用失败');
            }
        }
    </script>
</body>
</html>
