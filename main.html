<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程工业运维平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">工业智能运维平台</span>
            <div class="ms-auto d-flex align-items-center">
                <span id="welcome" class="text-white me-3"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 class="mb-4 text-center">欢迎使用工业运维平台</h3>

        <!-- 普通用户功能 -->
        <div id="userSection" style="display:none;">
            <!-- 图片、文本、提问卡片（同上一版） -->
            <!-- ... 为节省篇幅，这里省略，你可以直接把上一版 userSection 的内容粘进来 ... -->
        </div>

        <!-- 专家/管理员：所有上传处理记录 -->
        <div id="recordsSection" class="card mb-4" style="display:none;">
            <!-- 同上一版 -->
        </div>

        <!-- 仅管理员：账号管理 -->
        <div id="adminSection" class="card mb-4" style="display:none;">
            <!-- 同上一版 -->
        </div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        const role = currentUser.role || 'user';
        const username = currentUser.username;

        if (!username) {
            window.location.href = 'index.html';
        }

        document.getElementById('welcome').textContent = `欢迎，${username} (${role})`;

        // 角色显示逻辑（同上一版）
        if (role === 'user') document.getElementById('userSection').style.display = 'block';
        else if (role === 'expert' || role === 'admin') document.getElementById('recordsSection').style.display = 'block';
        if (role === 'admin') document.getElementById('adminSection').style.display = 'block';

        function logout() {
            localStorage.removeItem('currentUser');   // 只清除当前登录状态
            window.location.href = 'index.html';
        }

        // 你的其他函数（uploadImage、uploadTextLog 等）保持不变
    </script>
</body>
</html>
