<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>远程工业运维平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">工业智能运维平台</span>
            <span id="welcome" class="text-white me-3"></span>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">退出登录</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 id="pageTitle" class="mb-4">欢迎使用工业运维平台</h3>

        <!-- 所有角色都能用的功能 -->
        <div id="userSection">
            <!-- 图像上传、文本日志、咨询专家（保持你原来的功能） -->
            <!-- ... 你之前的上传和咨询代码可直接粘贴在这里 ... -->
            <!-- 为节省篇幅这里省略，实际替换时把你之前版本的这部分粘进来即可 -->
        </div>

        <!-- 专家 和 管理员 共用：所有上传记录 -->
        <div id="uploadsSection" class="card mb-4" style="display:none;">
            <div class="card-header bg-warning text-dark">📋 所有上传记录（专家 & 管理员共用）</div>
            <div class="card-body">
                <button onclick="loadAllUploads()" class="btn btn-warning">刷新所有上传记录</button>
                <div id="uploadList" class="mt-3"></div>
            </div>
        </div>

        <!-- 仅管理员可见：专门管理账号界面 -->
        <div id="usersSection" class="card mb-4" style="display:none;">
            <div class="card-header bg-danger text-white">👑 账号管理（仅管理员）</div>
            <div class="card-body">
                <button onclick="loadAllUsers()" class="btn btn-danger">刷新用户列表</button>
                <div id="userList" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
        const role = localStorage.getItem('role');
        const username = localStorage.getItem('username');

        if (!role) window.location.href = 'index.html';

        document.getElementById('welcome').textContent = `欢迎，${username}（${role}）`;

        // 专家和管理员共用上传记录
        if (role === 'expert' || role === 'admin') {
            document.getElementById('uploadsSection').style.display = 'block';
        }
        // 仅管理员可见账号管理界面
        if (role === 'admin') {
            document.getElementById('usersSection').style.display = 'block';
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        // mock 函数（后端上线后改成真实fetch）
        function loadAllUploads() {
            document.getElementById('uploadList').innerHTML = `<div class="alert alert-info">这里显示所有用户上传的图像和日志（专家和管理员都能看到）</div>`;
        }
        function loadAllUsers() {
            document.getElementById('userList').innerHTML = `<div class="alert alert-info">这里显示所有注册账号列表，只有管理员能看到并管理</div>`;
        }
    </script>
</body>
</html>
